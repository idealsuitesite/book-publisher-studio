name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm ci

      - name: Build shared-types
        run: npm run build --workspace=shared-types

      - name: Build
        run: npm run build --workspace=backend

      - name: Lint
        run: npm run lint --workspace=backend

      - name: Test
        run: npm test --workspace=backend -- --run
